name: Build Rekuta

on:
  workflow_dispatch:
    inputs:
      version-name:
        description: "Version Name"
        type: string
        default: "0.0.0"
        required: true
      release-draft:
        description: "Release Draft"
        type: boolean
        default: false
      beta:
        description: "Beta"
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle
    - name: Get Keystore
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        KEYSTORE_PROPERTIES: ${{ secrets.KEYSTORE_PROPERTIES }}
      run: |
        echo "$KEYSTORE_BASE64" | base64 -d > release.keystore
        echo "$KEYSTORE_PROPERTIES" > keystore.properties
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: Build with Gradle
      run: ./gradlew assembleRelease -PversionCode=$(($(date +%s) / 60)) -PversionName=${{ inputs.version-name }}
    - name: Upload Artifact
      if: ${{ !inputs.release-draft }}
      uses: actions/upload-artifact@v7
      with:
        path: app/build/outputs/apk/release/app-release.apk
        archive: false
    - name: Release Draft
      if: ${{ inputs.release-draft }}
      uses: softprops/action-gh-release@v3
      with:
        tag_name: v${{ inputs.version-name }}${{ inputs.beta && '-beta' || '' }}
        name: ${{ inputs.version-name }}${{ inputs.beta && ' Beta' || '' }}
        prerelease: ${{ inputs.beta }}
        draft: true
        files: app/build/outputs/apk/release/app-release.apk
